name: Bug Report
description: File a bug report to help improve Verbatim
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Please fill out the form below as completely as possible to help us reproduce and fix the bug.
  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear and concise description of what the bug is.
      placeholder: Describe the issue...
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Steps to Reproduce
      description: Steps to reproduce the behavior.
      placeholder: |
        1. Run command '...'
        2. Open Google Doc '...'
        3. See error '...'
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: A clear and concise description of what you expected to happen.
      placeholder: What should have happened...
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment Info
      description: OS version, Python version, library version, etc.
      placeholder: |
        - OS: macOS 14.4
        - Python: 3.12.3
        - Verbatim version: 0.1.0
    validations:
      required: false
