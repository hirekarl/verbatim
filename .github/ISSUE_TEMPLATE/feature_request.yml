name: Feature Request
description: Propose a new feature or enhancement for Verbatim
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Have an idea to make Verbatim better? Please describe it here.
  - type: textarea
    id: problem
    attributes:
      label: Is your feature request related to a problem?
      description: A clear and concise description of what the problem is (e.g., "I'm frustrated when...").
      placeholder: Describe the pain point...
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Describe the solution you'd like
      description: A clear and concise description of what you want to happen.
      placeholder: Describe the requested feature...
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Describe alternatives you've considered
      description: A clear and concise description of any alternative solutions or workarounds you've considered.
      placeholder: Describe alternatives...
    validations:
      required: false
  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Add any other context, screenshots, or examples about the feature request here.
    validations:
      required: false
